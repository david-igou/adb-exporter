name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: go mod tidy check
        run: make tidy
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: govulncheck
        run: make vulncheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit tests (race + coverage)
        run: make cover
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (linux/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-s -w" -o adb-exporter-linux-${{ matrix.goarch }} .
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: adb-exporter-linux-${{ matrix.goarch }}
          path: adb-exporter-linux-${{ matrix.goarch }}
